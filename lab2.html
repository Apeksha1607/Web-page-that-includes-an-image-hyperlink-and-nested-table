<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Digital Profile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    width: 600px;
    background: rgba(255,255,255,0.15);
    border-radius: 15px;
    padding: 20px;
}

.header {
    text-align: center;
}

.header img {
    width: 120px;
    border-radius: 50%;
    border: 3px solid white;
}

h1 {
    margin: 10px 0 5px;
}

 a {
    color: #ffe082;
}

 table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid white;
    padding: 8px;
    text-align: center;
}
</style>
</head>

<body>

<div class="card">

<div class="header">
    <!-- Image source: https://picsum.photos -->
    <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="Web learning icon">
    <h1>Student Learning Hub</h1>
    <p>
        Learn web skills at
        <a href="https://www.w3schools.com" target="_blank">W3Schools</a>
    </p>
</div>

<table>
<tr>
    <th>Category</th>
    <th>Description</th>
</tr>
<tr>
    <td>Profile</td>
    <td>Simple student digital card</td>
</tr>
<tr>
    <td>Learning</td>
    <td>Practice HTML and CSS basics</td>
</tr>
<tr>
    <td>Design</td>
    <td>Clean layout with gradient background</td>
</tr>
</table>

</div>

</body>
</html>
